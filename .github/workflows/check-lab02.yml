name: Check Lab 02 OpenAPI repo

on:
  push:
  pull_request:

jobs:
  structure-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          files=(
            README.md
            openapi.yaml
            campus-spectral.yaml
            negotiation-log.md
            VERSIONING.md
            package.json
            docs/lab02-guide.md
            docs/pairing-matrix.md
            docs/openapi-authoring-guide.md
            docs/swagger-online-workflow.md
            docs/event-contract-template.md
            docs/analysis-provider.md
            docs/analysis-consumer.md
            evidence/buoi-02/README.md
            evidence/buoi-02/checklist.md
            evidence/buoi-02/known-issues.md
            user-stories/README.md
            user-stories/pair-01-camera-ai-vision.md
            user-stories/pair-02-core-ai-vision.md
            user-stories/pair-03-core-access-gate.md
            user-stories/pair-04-core-notification-async.md
            user-stories/pair-05-iot-core-async.md
            user-stories/pair-06-iot-analytics-async.md
            user-stories/pair-07-camera-analytics-async.md
            user-stories/pair-08-core-analytics-async.md
            user-stories/pair-09-access-analytics-async.md
            user-stories/pair-10-access-core-policy.md
            scripts/install_lab02_cli.sh
            scripts/lint_openapi.sh
            scripts/mock_openapi.sh
            scripts/test_mock_with_curl.sh
            scripts/collect_session02_evidence.sh
          )

          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done

      - name: Shell syntax check
        run: |
          bash -n scripts/install_lab02_cli.sh
          bash -n scripts/lint_openapi.sh
          bash -n scripts/mock_openapi.sh
          bash -n scripts/test_mock_with_curl.sh
          bash -n scripts/collect_session02_evidence.shss